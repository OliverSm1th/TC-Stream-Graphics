<!DOCTYPE html>
<html>
    <!-- To build: 
     file=archive/nulscc-26/leaderboard npm run build -- --skip-absolute-urls 
    -->
    <head>
        <meta charset="utf-8">
        <title>Leaderboard</title>
        <meta name="description" content="">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <!-- <link rel="stylesheet" href="../../../anim/l3-grow-2/anim.css"> -->
        <link rel="stylesheet" href="leaderboard.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
</head>
    <body>
        <img src="../ref.png" style="width: 100%; z-index: -1; position: absolute; height: 100%; object-fit: cover;"/>
        <!-- <img src="uclref.png" style="z-index: 3; opacity: 20%; position: absolute; left:0; top:0; width: 55%"/> -->
        

        <div class="rows">

        </div>

        
        <template id="row-template">
            <div class="graphic">
                <div class="inner">
                <div class="position">
                    <div class="position-number">1</div>
                    <img class="logo" src="nulscc-logo.png" style="height: 10vh;">
                </div>
                <div class="info">
                    <svg width="35vw" height="8vh">
                        <defs>
                        <clipPath id="theClipPath">
                        <rect class="masker" x="0" y="0" width="100%" height="100%" fill="#fff" />
                        </clipPath>  
                        </defs> 
                        
                        <rect class="info-bg" x="0" y="0" width="33vw" height="8vh" fill='#7b7b7ba2'/> 
                        <!-- <rect class="info-bg" x="0" y="7.8vh" width="33vw" height="2px" fill="black"/>  -->

                        <text  x="1vw" y="5.3vh" class="name" fill="#1b191ce1">NULSCC</text>
                        <rect class="masker mask2" x="0" y="0" width="35vw" height="100%"/>
                        <g class="info-text" style="clip-path:url(#theClipPath)">
                        <text  x="1vw" y="5.3vh" width="10vw" class="name" fill="white">NULSCC</text>
                        </g>
                    </svg>
                    </div>
            </div>
            </div>
        </template>
        
        

        <!-- Required for l3-grow-2 -->
        <!-- <div id="ref" style="display: block; visibility: hidden; background-color: red; width: 100%; height: 100%;">
        </div> -->

        <script src="https://cdn.jsdelivr.net/npm/gsap@3.13.0/dist/SplitText.min.js"></script>
        <script src="../../../node_modules/gsap/dist/gsap.js"></script>
        <!-- <script src="../../../anim/l3-grow-2/anim.js"></script> -->
        <script src="leaderboard.js"></script>
        <script src="../../../dev.js"></script>

        <!-- Graphics Data Definition -->
        <!-- Used by H2R Graphics, describes what parameters can be entered via the update() function -->
        <script name="graphics-data-definition" type="application/json+gdd">
            {
                "$schema": "https://superflytv.github.io/GraphicsDataDefinition/gdd-meta-schema/v1/schema.json",
                "title": "Lower Third",
                "description": "woah",
                "type": "object",
                "properties": {
                        "rows": {
                          "type": "string",
                          "label": "Rows",
                          "gddType": "single-line"
                        }
                }
            }
        </script>
    </body>
</html>
